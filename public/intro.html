<!DOCTYPE html>
<html>
<head>
<title>KABOOM INTRO</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

/* VIDEO */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  animation:fadeIn 2s ease forwards;
}

/* FADE IN */
@keyframes fadeIn {
  to { opacity:1; }
}

/* BUTTON */
.enter {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  padding:18px 40px;
  font-size:22px;
  background:orange;
  color:white;
  border:none;
  cursor:pointer;
  opacity:0;
  border-radius:8px;

  /* 🔥 glow effect */
  box-shadow:0 0 20px orange;
  transition:all 0.4s ease;
}

/* HOVER EFFECT */
.enter:hover {
  transform:translate(-50%, -50%) scale(1.1);
  box-shadow:0 0 40px orange;
}
</style>

</head>

<body>

<video id="introVideo" autoplay muted playsinline>
  <source src="/intro.mp4" type="video/mp4">
</video>

<button class="enter" id="enterBtn" onclick="enterSite()">
🔥 ENTER NETWORK
</button>

<script>
const video = document.getElementById("introVideo");
const btn = document.getElementById("enterBtn");

// show button after 2 seconds
setTimeout(() => {
  btn.style.opacity = 1;
}, 2000);

// click anywhere to enable sound
document.addEventListener("click", () => {
  video.muted = false;
  video.play();
});

// smooth transition to main site
function enterSite(){
  document.body.style.opacity = 0;
  document.body.style.transition = "1s";

  setTimeout(() => {
    window.location.href = "/index.html?play=true";
  }, 800);
}
</script>

</body>
</html>
