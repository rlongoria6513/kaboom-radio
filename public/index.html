<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:#0b0b0b;
}

.container{
  padding:20px;
  max-width:400px;
  margin:auto;
}

/* 🎧 SPOTIFY STYLE CARD */
.card{
  background:#181818;
  border-radius:15px;
  padding:15px;
  margin-top:15px;
}

h2{
  text-align:center;
}

button, select{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  background:#ff6600;
  color:white;
}

canvas{
  width:140px;
  height:140px;
  display:block;
  margin:auto;
}

/* 💰 AD BOX */
.adBox{
  margin-top:15px;
  background:#222;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* 🧠 ADMIN */
textarea{
  width:100%;
  height:80px;
  margin-top:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>🔥 KABOOM RADIO PRO 🔥</h2>

<!-- 🎧 PLAYER -->
<div class="card">

<div id="stationName">Main Tejano</div>

<select onchange="changeStation(this.value)">
  <option value="main">Main Tejano</option>
  <option value="latin">Latin Mix</option>
  <option value="party">Party Hits</option>
</select>

<canvas id="visualizer" width="150" height="150"></canvas>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>
<button onclick="startPlaylist()">🎵 AUTO DJ</button>

</div>

<!-- 🎵 ON DEMAND -->
<div class="card">
<h3>🎵 On Demand</h3>

<select onchange="playOnDemand(this.value)">
  <option value="">Select Song</option>
  <option value="audio/song1.mp3">Track 1</option>
  <option value="audio/song2.mp3">Track 2</option>
</select>
</div>

<!-- 💰 MONEY -->
<div class="card">
<h3>💰 Support / Shop</h3>

<a href="https://www.amazon.com/s?k=tejano+music" target="_blank">
<button>🛒 Buy Tejano Music</button>
</a>

<div class="adBox">
📢 Your Ad Here (Google AdSense later)
</div>
</div>

<!-- 🧠 ADMIN -->
<div class="card">
<h3>🧠 Admin Playlist</h3>

<textarea id="songList">
audio/song1.mp3
audio/song2.mp3
</textarea>

<button onclick="updatePlaylist()">💾 Save Playlist</button>
</div>

<audio id="player"></audio>

</div>

<script>

let audio = document.getElementById("player");

/* 🎵 PLAYLIST */
let playlist = [
  "audio/song1.mp3",
  "audio/song2.mp3"
];

let currentTrack = 0;

function startPlaylist(){
  audio.src = playlist[currentTrack];
  audio.play();
}

audio.addEventListener("ended", ()=>{
  currentTrack++;
  if(currentTrack >= playlist.length) currentTrack = 0;
  startPlaylist();
});

/* 🧠 ADMIN */
function updatePlaylist(){
  let text = document.getElementById("songList").value;
  playlist = text.split("\n").map(s => s.trim()).filter(s => s);
  alert("Playlist Updated");
}

/* 📻 STATIONS */
let stations = {
  main: "https://pstnet38.shoutcastnet.com:10044/stream",
  latin: "https://stream.zeno.fm/f3wvbbqmdg8uv",
  party: "https://stream.zeno.fm/8u1qf1h7r8quv"
};

function changeStation(val){
  audio.src = stations[val];
  document.getElementById("stationName").innerText = val.toUpperCase();
  audio.play();
}

/* ▶ PLAY */
let audioCtx, analyser, source;

function playRadio(){

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }

  audio.play();

  if(!source){
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    drawVisualizer();
  }
}

function pauseRadio(){
  audio.pause();
}

/* 🎵 ON DEMAND */
function playOnDemand(file){
  if(file){
    audio.src = file;
    audio.play();
  }
}

/* 🎧 VISUALIZER */
function drawVisualizer(){

  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    let bass = dataArray[2]*0.4;
    let radius = 30 + bass;

    ctx.beginPath();
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.fillStyle="rgba(255,140,0,0.2)";
    ctx.fill();

    for(let i=0;i<bufferLength;i++){
      let val=dataArray[i];
      let angle=(i/bufferLength)*Math.PI*2;
      let h=val*0.4;

      let x1=cx+Math.cos(angle)*radius;
      let y1=cy+Math.sin(angle)*radius;
      let x2=cx+Math.cos(angle)*(radius+h);
      let y2=cy+Math.sin(angle)*(radius+h);

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.strokeStyle="orange";
      ctx.stroke();
    }
  }

  draw();
}

</script>

</body>
</html>
