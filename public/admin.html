```html
<!DOCTYPE html>
<html>
<head>
<title>KABOOM INDUSTRY CONTROL CENTER</title>

<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px;
}

.box {
  border: 2px solid red;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 0 20px red;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 10px 15px;
  margin-top: 10px;
  cursor: pointer;
}

input {
  padding: 8px;
  width: 70%;
}
</style>
</head>

<body>

<h1>🔥 KABOOM INDUSTRY CONTROL CENTER 🔥</h1>

<div class="container">

<div class="box">
<h2>🎵 Upload Music</h2>
<input type="file" id="file">
<br>
<button onclick="upload()">Upload</button>
</div>

<div class="box">
<h2>📡 Change Stream</h2>
<input id="streamUrl" placeholder="Paste stream URL">
<br>
<button onclick="setStream()">Update Stream</button>
</div>

<div class="box">
<h2>📚 Song Library</h2>
<ul id="songs"></ul>
</div>

<div class="box">
<h2>🎧 Playlist</h2>
<ul id="playlist"></ul>
</div>

</div>

<script>
async function upload(){
 let file=document.getElementById('file').files[0];
 let form=new FormData();
 form.append("file",file);
 await fetch('/upload',{method:'POST',body:form});
 loadSongs();
}

async function loadSongs(){
 let res=await fetch('/songs');
 let data=await res.json();

 let list=document.getElementById("songs");
 list.innerHTML="";

 data.forEach(song=>{
  let li=document.createElement("li");
  li.innerText=song;

  let btn=document.createElement("button");
  btn.innerText="Add";

  btn.onclick=()=>{
    fetch('/add-to-playlist',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({song})
    });
    loadPlaylist();
  };

  li.appendChild(btn);
  list.appendChild(li);
 });
}

async function loadPlaylist(){
 let res=await fetch('/playlist');
 let data=await res.json();

 let list=document.getElementById("playlist");
 list.innerHTML="";

 data.forEach(song=>{
  let li=document.createElement("li");
  li.innerText=song;
  list.appendChild(li);
 });
}

function setStream(){
 fetch('/set-stream',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    url:document.getElementById('streamUrl').value
  })
 });
}

loadSongs();
loadPlaylist();
</script>

</body>
</html>
```
