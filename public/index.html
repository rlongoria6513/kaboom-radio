<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>

<link rel="manifest" href="/public/manifest.json">
<link rel="apple-touch-icon" href="/public/icon-192.png">

<meta name="theme-color" content="#ff6600">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KABOOM RADIO">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>

/* SPLASH */
#splash{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  color:orange;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  z-index:9999;
}

/* BACKGROUND VIDEO */

}

/* OVERLAY */
body
  body{
  margin:0;
  color:white;
  text-align:center;
  font-family:Arial;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}
  
  ::after{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* BODY */
body{
  margin:0;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* LOGO */
.logoWrap{
  display:flex;
  justify-content:center;
  margin-top:30px;
}

#mainVideo{
  width:500px;
  max-width:90%;
}

/* PLAYER */
.player{
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* BUTTON */
button{
  background:orange;
  border:none;
  padding:15px 25px;
  font-size:18px;
  border-radius:8px;
}

/* BARS */
.bars{
  display:flex;
  justify-content:center;
  gap:5px;
  margin:20px 0;
}

.bars span{
  width:6px;
  height:20px;
  background:orange;
  animation:bounce 1s infinite;
}

@keyframes bounce{
  0%,100%{height:10px;}
  50%{height:30px;}
}

/* MOBILE */
@media (max-width:600px){
  #mainVideo{width:95%;}
  .player{top:75%;}
  button{width:80%;}
}

</style>
</head>

<body>

<div id="splash">🔥 KABOOM RADIO 🔥</div>

<!-- VIDEO -->


<h1>🔥 KABOOM TEJANO NETWORK 🔥</h1>
<p id="nowPlaying">🎵 Loading...</p>

<div class="logoWrap">
  <video id="mainVideo" autoplay muted loop playsinline>
    <source src="/public/mainvideo.mp4" type="video/mp4">
  </video>
</div>

<div class="player">

<audio id="player"></audio>

<div class="bars">
<span></span><span></span><span></span><span></span><span></span>
</div>

<button onclick="startRadio()">🔥 PLAY LIVE RADIO</button>

</div>

<script>

let audio = document.getElementById("player");

// 🔥 DIRECT STREAM (NO SERVER NEEDED)
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";

// PLAY
function startRadio(){
  audio.play();
  document.getElementById("nowPlaying").innerText = "🎵 LIVE TEJANO STREAM";
}

// SPLASH
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
  },1500);
});

// PWA
if ("serviceWorker" in navigator){
  navigator.serviceWorker.register("/public/sw.js");
}

</script>

</body>
</html>
