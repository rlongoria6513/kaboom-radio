<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

/* CENTER APP */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  padding:20px;
}

/* PLAYER CARD */
.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:20px;
  width:100%;
  max-width:320px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  font-size:18px;
}

/* SLIDER */
input[type=range]{
  width:100%;
  margin-top:10px;
}

/* VISUALIZER */
canvas{
  display:block;
  margin:10px auto;
  width:200px;
  height:200px;
}
</style>

</head>

<body>

<div class="container">

<h2>🔥 KABOOM RADIO 🔥</h2>
<p id="nowPlaying">Tap PLAY to start</p>

<div class="playerBox">

<canvas id="visualizer" width="200" height="200"></canvas>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>

<input type="range" min="0" max="1" step="0.01" value="0.7"
       oninput="setVolume(this.value)">

</div>

<audio id="player"></audio>

</div>

<script>

let audio = document.getElementById("player");

// 🔥 STREAM
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";
audio.setAttribute("playsinline", true);
audio.setAttribute("webkit-playsinline", true);
audio.crossOrigin = "anonymous";

let audioCtx;
let analyser;
let source;

// ▶ PLAY (iPHONE SAFE)
function playRadio(){

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }

  audio.muted = false;

  audio.play().then(()=>{

    if(!source){

      source = audioCtx.createMediaElementSource(audio);
      analyser = audioCtx.createAnalyser();

      analyser.fftSize = 512;

      source.connect(analyser);
      analyser.connect(audioCtx.destination);

      drawVisualizer();
    }

    document.getElementById("nowPlaying").innerText = "🎵 Playing";

  }).catch(()=>{
    alert("Tap PLAY again");
  });
}

// ⏸ PAUSE
function pauseRadio(){
  audio.pause();
  document.getElementById("nowPlaying").innerText = "⏸ Paused";
}

// 🔊 VOLUME
function setVolume(val){
  audio.volume = val;
}

// 🎧 VISUALIZER (RESPONSIVE)
function drawVisualizer(){

  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    let bass = dataArray[2] * 0.5;
    let radius = 40 + bass;

    // center pulse
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255,140,0,0.2)";
    ctx.fill();

    // bars
    for(let i=0;i<bufferLength;i++){

      let val = dataArray[i];
      let angle = (i/bufferLength)*Math.PI*2;
      let height = val * 0.6;

      let x1 = cx + Math.cos(angle)*radius;
      let y1 = cy + Math.sin(angle)*radius;

      let x2 = cx + Math.cos(angle)*(radius + height);
      let y2 = cy + Math.sin(angle)*(radius + height);

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.strokeStyle="orange";
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  draw();
}

</script>

</body>
</html>
