<!DOCTYPE html>
<html>

<head>

<title>KABOOM RADIO</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="apple-touch-startup-image" href="/icon-512.png">

<meta name="theme-color" content="#ff6600">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KABOOM RADIO">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>

/* SPLASH SCREEN */
#splash {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:orange;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  z-index:9999;
}

/* BACKGROUND VIDEO */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* DARK OVERLAY */
body::after {
  content: "";
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* PAGE */
body {
  margin:0;
  color:white;
  text-align:center;
  font-family:Arial;
  overscroll-behavior: none;
}

/* LOGO */
.logoWrap {
  display:flex;
  justify-content:center;
  margin-top:30px;
}

#mainVideo {
  width:500px;
  max-width:90%;
}

/* PLAYER */
.player {
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%, -50%);
}

/* BUTTON */
button {
  background:orange;
  border:none;
  padding:15px 25px;
  font-size:18px;
  cursor:pointer;
  border-radius:8px;
}

/* BARS */
.bars {
  display:flex;
  justify-content:center;
  gap:5px;
  margin:20px 0;
}

.bars span {
  width:6px;
  height:20px;
  background:orange;
  animation:bounce 1s infinite;
}

@keyframes bounce {
  0%,100% { height:10px; }
  50% { height:30px; }
}

/* MOBILE */
@media (max-width:600px){
  #mainVideo { width:95%; }
  .player { top:75%; }
  button { width:80%; }
}

</style>

</head>

<body>

<!-- SPLASH -->
<div id="splash">🔥 KABOOM RADIO 🔥</div>

<!-- BACKGROUND VIDEO -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="mainvideo.mp4" type="video/mp4">
</video>

<h1>🔥 KABOOM TEJANO NETWORK 🔥</h1>
<p id="nowPlaying">🎵 Now Playing: Tejano Mix Live</p>

<!-- LOGO -->
<div class="logoWrap">
  <video id="mainVideo" autoplay muted loop playsinline>
    <source src="mainvideo.mp4" type="video/mp4">
  </video>
</div>

<!-- PLAYER -->
<div class="player">

  <audio id="player"></audio>

  <div class="bars">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <button onclick="startRadio()">▶ START RADIO</button>

</div>

<script>
let audio = document.getElementById("player");

// load stream
async function loadStream(){
  let res = await fetch('/stream');
  let url = await res.text();
  audio.src = url;
}
loadStream();

// start radio
function startRadio(){
  audio.muted = false;
  audio.play();
  if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "KABOOM RADIO",
    artist: "Tejano Mix",
    album: "Live Stream",
    artwork: [
      { src: "/icon-192.png", sizes: "192x192", type: "image/png" },
      { src: "/icon-512.png", sizes: "512x512", type: "image/png" }
    ]
  });

  navigator.mediaSession.setActionHandler('play', () => {
    audio.play();
  });

  navigator.mediaSession.setActionHandler('pause', () => {
    audio.pause();
  });
}
}

// fake now playing
const songs = ["Tejano Mix","Cumbia Party","KABOOM Radio"];

function updateNowPlaying(){
  let random = songs[Math.floor(Math.random()*songs.length)];
  document.getElementById("nowPlaying").innerText =
    "🎵 Now Playing: " + random;
}

setInterval(updateNowPlaying, 4000);

// splash screen hide
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
  }, 1500);
});

// service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
