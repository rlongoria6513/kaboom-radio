<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:20px;
  width:100%;
  max-width:340px;
  box-shadow: 0 0 30px rgba(255,165,0,0.2);
}

h1{font-size:22px;}

button{
  width:100%;
  margin-top:10px;
  padding:16px;
  font-size:18px;
  border-radius:12px;
  border:none;
  background: linear-gradient(45deg, orange, #ff6600);
  color:white;
  font-weight:bold;
}

input{
  width:100%;
  margin-top:10px;
}

#visualizer{
  margin:20px auto;
  display:block;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 KABOOM RADIO 🔥</h1>
<p id="nowPlaying">🎵 Ready</p>

<div class="playerBox">

<canvas id="visualizer" width="260" height="260"></canvas>

<select onchange="changeStation(this.value)">
  <option value="https://pstnet38.shoutcastnet.com:10044/stream">Main Tejano</option>
</select>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>

<input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">

</div>

<audio id="player" crossorigin="anonymous"></audio>

</div>

<script>

let audio = document.getElementById("player");
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";

let audioCtx, analyser, source, gainNode;

// PLAY
function playRadio(){
  audio.play();
  document.getElementById("nowPlaying").innerText = "🎵 LIVE";

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    gainNode = audioCtx.createGain();

    source = audioCtx.createMediaElementSource(audio);

    // 🔥 FIXED AUDIO ROUTING
    source.connect(analyser);
    analyser.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    analyser.fftSize = 256;

    drawVisualizer();
  }
}

// PAUSE
function pauseRadio(){
  audio.pause();
}

// 🔥 REAL VOLUME CONTROL (FIXED)
function setVolume(v){
  if(gainNode){
    gainNode.gain.value = v;
  }
}

// CHANGE STATION
function changeStation(url){
  audio.src = url;
  audio.play();
}

// 🔥 STYLE 3 RING VISUALIZER
function drawVisualizer(){

  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    // GLOW RING
    ctx.beginPath();
    ctx.arc(cx, cy, 60, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,140,0,0.3)";
    ctx.lineWidth = 10;
    ctx.shadowBlur = 25;
    ctx.shadowColor = "orange";
    ctx.stroke();

    // BARS
    for(let i=0;i<bufferLength;i++){
      let val = dataArray[i];
      let angle = (i/bufferLength) * Math.PI * 2;

      let base = 60;
      let height = val * 0.6;

      let x1 = cx + Math.cos(angle)*base;
      let y1 = cy + Math.sin(angle)*base;

      let x2 = cx + Math.cos(angle)*(base+height);
      let y2 = cy + Math.sin(angle)*(base+height);

      let grad = ctx.createLinearGradient(x1,y1,x2,y2);
      grad.addColorStop(0,"orange");
      grad.addColorStop(1,"red");

      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();
    }

    // CENTER PULSE
    let avg = dataArray.reduce((a,b)=>a+b,0)/bufferLength;
    let pulse = avg * 0.2;

    ctx.beginPath();
    ctx.arc(cx, cy, 20 + pulse, 0, Math.PI*2);
    ctx.fillStyle = "orange";
    ctx.shadowBlur = 30;
    ctx.shadowColor = "orange";
    ctx.fill();
  }

  draw();
}

</script>

</body>
</html>
