<!DOCTYPE html>
<html>
<head>
<title>KABOOM RADIO</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.player {
  margin-top:120px;
}

button {
  background:orange;
  border:none;
  padding:15px 25px;
  font-size:18px;
  cursor:pointer;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🔥 KABOOM TEJANO NETWORK 🔥</h1>
<h2 id="nowPlaying">🎵 Now Playing...</h2>
<div class="player">
  <audio id="player" controls></audio>
  <canvas id="visualizer" width="400" height="100"></canvas>
  <button onclick="startRadio()">▶ START RADIO</button>
  <br><br>
  <button onclick="startRadio()">▶ START RADIO</button>
</div>

<script>
let audio = document.getElementById("player");
let nowPlaying = document.getElementById("nowPlaying");

// load stream
async function loadStream(){
  let res = await fetch('/stream');
  let url = await res.text();
  audio.src = url;
}
loadStream();

// 🎵 fake now playing (for now)
const songs = [
  "Tejano Mix Live",
  "Cumbia Party",
  "KABOOM Radio",
  "Latin Hits Mix"
];

function updateNowPlaying(){
  let random = songs[Math.floor(Math.random() * songs.length)];
  nowPlaying.innerText = "🎵 Now Playing: " + random;
}

setInterval(updateNowPlaying, 4000);
updateNowPlaying();

// ▶ start radio button
function startRadio(){
  audio.muted = false;
  audio.play();
}

// 🎧 visualizer
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

function drawBars(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for(let i = 0; i < 20; i++){
    let height = Math.random() * 100;
    ctx.fillStyle = "orange";
    ctx.fillRect(i * 20, 100 - height, 10, height);
  }
}

setInterval(drawBars, 100);
</script>

</body>
</html>
