<!DOCTYPE html>
<html>
<head>
<title>KABOOM INTRO</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

/* FULLSCREEN VIDEO */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BUTTON */
.enter {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  padding:15px 30px;
  font-size:20px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
  opacity:0;
  transition:1s;
}
</style>

</head>

<body>

<!-- ✅ VIDEO MUST BE HERE -->
<video id="introVideo" autoplay muted playsinline>
  <source src="/intro.mp4" type="video/mp4">
</video>

<button class="enter" id="enterBtn" onclick="enterSite()">
ENTER NETWORK
</button>

<script>
const video = document.getElementById("introVideo");
const btn = document.getElementById("enterBtn");

// show button after video starts
video.onplay = () => {
  btn.style.opacity = 1;
};

// click anywhere to enable sound
document.addEventListener("click", () => {
  video.muted = false;
  video.play();
});

// go to main page
function enterSite(){
  window.location.href = "/index.html?play=true";
}
</script>

</body>
</html>
