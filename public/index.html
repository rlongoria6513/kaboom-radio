<!DOCTYPE html>
<html>
<head>
<title>KABOOM RADIO</title>

<style>

/* 🎬 BACKGROUND VIDEO */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* 🌑 DARK OVERLAY */
body::after {
  content: "";
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* 🧠 PAGE STYLE */
body {
  margin:0;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* 🎯 CENTER LOGO */
.logoWrap {
  display:flex;
  justify-content:center;
  margin-top:40px;
}

#mainVideo {
  width:600px;
  max-width:90%;
}

/* 🎵 PLAYER CENTER */
.player {
  position:absolute;
  top:70%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:2;
}

/* 🔘 BUTTON */
button {
  background:orange;
  border:none;
  padding:15px 25px;
  font-size:18px;
  cursor:pointer;
  border-radius:8px;
}

/* 🎚️ BARS */
.bars {
  display:flex;
  justify-content:center;
  gap:5px;
  margin:20px 0;
}

.bars span {
  width:6px;
  height:20px;
  background:orange;
  animation:bounce 1s infinite ease-in-out;
}

.bars span:nth-child(odd) {
  animation-delay:0.2s;
}

@keyframes bounce {
  0%,100% { height:10px; }
  50% { height:30px; }
}

</style>
</head>

<body>

<!-- 🎬 BACKGROUND VIDEO -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="mainvideo.mp4" type="video/mp4">
</video>

<h1>🔥 KABOOM TEJANO NETWORK 🔥</h1>
<p id="nowPlaying">🎵 Now Playing: Tejano Mix Live</p>

<!-- 🔥 LOGO VIDEO -->
<div class="logoWrap">
  <video id="mainVideo" autoplay muted loop playsinline>
    <source src="mainvideo.mp4" type="video/mp4">
  </video>
</div>

<!-- 🎵 PLAYER -->
<div class="player">

  <audio id="player"></audio>

  <div class="bars">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <button onclick="startRadio()">▶ START RADIO</button>

</div>

<script>

let audio = document.getElementById("player");

// load stream
async function loadStream(){
  let res = await fetch('/stream');
  let url = await res.text();
  audio.src = url;
}
loadStream();

// ▶ start radio
function startRadio(){
  audio.muted = false;
  audio.play();
}

// fake now playing
const songs = [
  "Tejano Mix Live",
  "Cumbia Party",
  "KABOOM Radio",
  "Latin Hits Mix"
];

function updateNowPlaying(){
  let random = songs[Math.floor(Math.random() * songs.length)];
  document.getElementById("nowPlaying").innerText =
    "🎵 Now Playing: " + random;
}

setInterval(updateNowPlaying, 4000);

</script>

</body>
</html>
