<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100vh;
  padding:20px;
}

.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:15px;
  width:100%;
  max-width:320px;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  font-size:16px;
}

input[type=range]{
  width:100%;
  margin-top:10px;
}

/* 🔥 SMALLER VISUALIZER */
canvas{
  display:block;
  margin:10px auto;
  width:150px;
  height:150px;
}

/* ARTWORK */
#artwork{
  width:120px;
  border-radius:12px;
  margin:10px auto;
}

/* 🎵 SONG HISTORY */
#history{
  margin-top:15px;
  max-width:320px;
  width:100%;
  text-align:left;
  font-size:14px;
}

.history-item{
  padding:5px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* 📱 INSTALL BUTTON */
.installBtn{
  margin-top:10px;
  background:#222;
}
</style>

</head>

<body>

<div class="container">

<h2>🔥 KABOOM RADIO 🔥</h2>
<p id="nowPlaying">Tap PLAY to start</p>

<img id="artwork" src="https://via.placeholder.com/300">

<div class="playerBox">

<canvas id="visualizer" width="150" height="150"></canvas>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>

<input type="range" min="0" max="1" step="0.01" value="0.7"
       oninput="setVolume(this.value)">

<button class="installBtn" onclick="installApp()">📱 Install App</button>

</div>

<!-- 🎵 HISTORY -->
<div id="history"></div>

<audio id="player"></audio>

</div>

<script>

let audio = document.getElementById("player");
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";
audio.setAttribute("playsinline", true);
audio.crossOrigin = "anonymous";

let audioCtx, analyser, source;
let currentSong = "";
let historyList = [];

// ▶ PLAY
function playRadio(){

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }

  audio.play();

  if(!source){
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    drawVisualizer();
  }

  document.getElementById("nowPlaying").innerText = "🎵 Playing";
}

// ⏸ PAUSE
function pauseRadio(){
  audio.pause();
}

// 🔊 VOLUME
function setVolume(val){
  audio.volume = val;
}

// 🎵 SONG DETECTION + HISTORY
async function getNowPlaying(){
  try{
    let res = await fetch("https://pstnet38.shoutcastnet.com:10044/7.html");
    let text = await res.text();

    let song = text.split(",")[6];

    if(song && song !== currentSong){

      currentSong = song;
      document.getElementById("nowPlaying").innerText = "🎵 " + song;

      // add to history
      historyList.unshift(song);
      if(historyList.length > 10) historyList.pop();

      updateHistory();

      fetchArtwork(song);
    }
  }catch(e){}
}

function updateHistory(){
  let container = document.getElementById("history");
  container.innerHTML = "<h4>Recent Songs</h4>";

  historyList.forEach(s => {
    container.innerHTML += `<div class="history-item">${s}</div>`;
  });
}

// 🎨 ARTWORK
async function fetchArtwork(song){

  let query = encodeURIComponent(song);

  let res = await fetch(`https://itunes.apple.com/search?term=${query}&limit=1`);
  let data = await res.json();

  if(data.results.length > 0){
    document.getElementById("artwork").src =
      data.results[0].artworkUrl100.replace("100x100","500x500");
  }
}

// 🔄 UPDATE
setInterval(getNowPlaying, 10000);

// 📱 INSTALL (iPhone helper)
function installApp(){
  alert("On iPhone:\nTap Share ➜ Add to Home Screen 📱");
}

// 🎧 VISUALIZER (SMALL + CLEAN)
function drawVisualizer(){

  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    let bass = dataArray[2] * 0.4;
    let radius = 30 + bass;

    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255,140,0,0.2)";
    ctx.fill();

    for(let i=0;i<bufferLength;i++){

      let val = dataArray[i];
      let angle = (i/bufferLength)*Math.PI*2;
      let height = val * 0.4;

      let x1 = cx + Math.cos(angle)*radius;
      let y1 = cy + Math.sin(angle)*radius;

      let x2 = cx + Math.cos(angle)*(radius + height);
      let y2 = cy + Math.sin(angle)*(radius + height);

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.strokeStyle="orange";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  draw();
}

</script>

</body>
</html>
