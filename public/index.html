<!DOCTYPE html>
<html>
<head>
<title>KABOOM RADIO</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.player {
  margin-top:120px;
}

button {
  background:orange;
  border:none;
  padding:15px 25px;
  font-size:18px;
  cursor:pointer;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🔥 KABOOM TEJANO NETWORK 🔥</h1>

<div class="player">
  <audio id="player" controls></audio>
  <button onclick="startRadio()">▶ START RADIO</button>
  <br><br>
  <button onclick="startRadio()">▶ START RADIO</button>
</div>

<script>
let audio = document.getElementById("player");

async function loadStream(){
  let res = await fetch('/stream');
  let url = await res.text();
  audio.src = url;
}
loadStream();

// 👇 detect intro redirect
const params = new URLSearchParams(window.location.search);

if(params.get("play") === "true"){
  setTimeout(() => {
    audio.muted = false;
    audio.play().catch(() => {
      console.log("Autoplay blocked");
    });
  }, 500);
}

function startRadio(){
  audio.muted = false;
  audio.play();
}
</script>

</body>
</html>
