<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:20px;
  width:100%;
  max-width:340px;
}

h1{font-size:22px;}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:10px;
  border:none;
  background: orange;
  color:white;
}

.linkBtn{
  display:block;
  margin-top:8px;
  padding:10px;
  background:#222;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

#artwork{
  width:100%;
  border-radius:12px;
}

#visualizer{
  margin:15px auto;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 KABOOM RADIO 🔥</h1>
<p id="nowPlaying">🎵 Loading...</p>

<div class="playerBox">

<img id="artwork" src="https://via.placeholder.com/500" />

<canvas id="visualizer" width="260" height="260"></canvas>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>

<a id="itunesLink" class="linkBtn" target="_blank">🍎 Open in Apple Music</a>
<a id="amazonLink" class="linkBtn" target="_blank">🛒 Open in Amazon Music</a>

</div>

<audio id="player" crossorigin="anonymous"></audio>

</div>

<script>

let audio = document.getElementById("player");
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";

let audioCtx, analyser, source;

// PLAY
function playRadio(){
  audio.play();

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 256;
    drawVisualizer();
  }
}

// PAUSE
function pauseRadio(){
  audio.pause();
}

// 🎵 GET SONG FROM STREAM
async function getNowPlaying(){
  try{
    let res = await fetch("https://pstnet38.shoutcastnet.com:10044/7.html");
    let text = await res.text();

    let song = text.split(",")[6];

    if(song){
      document.getElementById("nowPlaying").innerText = "🎵 " + song;

      let parts = song.split(" - ");
      let artist = parts[0] || "";
      let title = parts[1] || song;

      fetchArtwork(artist, title);
    }

  }catch(e){}
}

// 🎨 GET ARTWORK + LINKS
async function fetchArtwork(artist, title){

  let query = encodeURIComponent(artist + " " + title);

  // iTunes
  let res = await fetch(`https://itunes.apple.com/search?term=${query}&limit=1`);
  let data = await res.json();

  if(data.results.length > 0){

    let track = data.results[0];

    let art = track.artworkUrl100.replace("100x100","500x500");
    document.getElementById("artwork").src = art;

    document.getElementById("itunesLink").href = track.trackViewUrl;

    // Amazon search link
    let amazonURL = `https://www.amazon.com/s?k=${query}&i=digital-music`;
    document.getElementById("amazonLink").href = amazonURL;
  }
}

// 🔁 UPDATE SONG
setInterval(getNowPlaying, 10000);
getNowPlaying();

// 🔥 VISUALIZER
function drawVisualizer(){

  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    ctx.beginPath();
    ctx.arc(cx, cy, 60, 0, Math.PI*2);
    ctx.strokeStyle = "rgba(255,140,0,0.3)";
    ctx.lineWidth = 8;
    ctx.stroke();

    for(let i=0;i<bufferLength;i++){
      let val = dataArray[i];
      let angle = (i/bufferLength)*Math.PI*2;
      let h = val*0.6;

      let x1 = cx + Math.cos(angle)*60;
      let y1 = cy + Math.sin(angle)*60;
      let x2 = cx + Math.cos(angle)*(60+h);
      let y2 = cy + Math.sin(angle)*(60+h);

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.strokeStyle="orange";
      ctx.stroke();
    }
  }

  draw();
}

</script>

</body>
</html>
