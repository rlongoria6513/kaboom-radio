<!DOCTYPE html>
<html>
<head>
<title>KABOOM INTRO</title>

<style>
body {
  <video id="introVideo" autoplay muted playsinline>
  <source src="intro.mp4" type="video/mp4">
</video>

<button class="enter" onclick="enterSite()">ENTER NETWORK</button>

<script>
function enterSite() {
  const video = document.getElementById("introVideo");

  // 🔊 unlock sound
  video.muted = false;

  video.play().catch(() => {
    console.log("Audio blocked");
  });

  // wait then go to main page
  setTimeout(() => {
    window.location.href = "index.html?play=true";
  }, 600);
}
</script>
</style>
</head>

<body>

<script>
let video = document.getElementById("introVideo");

document.addEventListener("click", () => {
  video.muted = false;
  video.play();
});
</script>
  <source src="intro.mp4" type="video/mp4">
</video>

<button class="enter" id="enterBtn" onclick="enterSite()">
  ENTER NETWORK
</button>

<audio id="preloadAudio"></audio>

<script>
async function enterSite(){

  let audio = document.getElementById("preloadAudio");

  try {
    let res = await fetch('/stream');
    let url = await res.text();

    audio.src = url;

    // 🔥 unlock audio BEFORE leaving page
    await audio.play();

  } catch(e){
    console.log("Audio unlock failed");
  }

  // go to main page
  window.location.href = "index.html";
}
</script>

<script>
function enterSite(){
  window.location.href = "index.html?play=true";
}
</script></button>

<script>
const video = document.getElementById("introVideo");
const btn = document.getElementById("enterBtn");

video.onended = () => {
  btn.style.opacity = 1;
};

btn.onclick = () => {
  window.location.href = "/index.html";
};
</script>

</body>
</html>
