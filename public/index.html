<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO NETWORK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  let playlist = [
  "audio/song1.mp3",
  "audio/song2.mp3",
  "audio/song3.mp3"
];

let currentTrack = 0;

// ▶ START PLAYLIST
function startPlaylist(){
  audio.src = playlist[currentTrack];
  audio.play();
  updateTrackName();
}

// 🔁 NEXT SONG
audio.addEventListener("ended", () => {
  currentTrack++;
  if(currentTrack >= playlist.length){
    currentTrack = 0;
  }
  startPlaylist();
});

// 🎵 SHOW TRACK NAME
function updateTrackName(){
  let name = playlist[currentTrack].split("/").pop();
  document.getElementById("nowPlaying").innerText = "🎵 " + name;
  <button onclick="startPlaylist()">🎵 AUTO PLAYLIST</button>
}
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

.container{
  padding:20px;
}

.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:15px;
  max-width:320px;
  margin:auto;
}

select, button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  background:orange;
  color:white;
}

canvas{
  width:150px;
  height:150px;
  margin:10px auto;
  display:block;
}

.stationTitle{
  margin-top:15px;
  font-size:18px;
}
</style>

</head>

<body>

<div class="container">

<h2>🔥 KABOOM RADIO NETWORK 🔥</h2>

<div class="playerBox">

<div class="stationTitle" id="stationName">Main Tejano</div>

<select onchange="changeStation(this.value)">
  <option value="main">Main Tejano</option>
  <option value="latin">Latin Mix</option>
  <option value="party">Party Hits</option>
</select>

<canvas id="visualizer" width="150" height="150"></canvas>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>

</div>

<h3>🎵 On Demand</h3>

<select onchange="playOnDemand(this.value)">
  <option value="">Select Song</option>
  <option value="audio/song1.mp3">Tejano Track 1</option>
  <option value="audio/song2.mp3">Latin Track 1</option>
  <option value="audio/song3.mp3">Party Track 1</option>
</select>

<audio id="player"></audio>

</div>

<script>

let audio = document.getElementById("player");

let stations = {
  main: "https://pstnet38.shoutcastnet.com:10044/stream",
  latin: "https://stream.zeno.fm/f3wvbbqmdg8uv",
  party: "https://stream.zeno.fm/8u1qf1h7r8quv"
};

let stationNames = {
  main: "Main Tejano",
  latin: "Latin Mix",
  party: "Party Hits"
};

let currentStation = "main";
audio.src = stations[currentStation];

let audioCtx, analyser, source;

// ▶ PLAY
function playRadio(){

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }

  audio.play();

  if(!source){
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    drawVisualizer();
  }
}

// ⏸ PAUSE
function pauseRadio(){
  audio.pause();
}

// 🔁 CHANGE STATION
function changeStation(val){
  currentStation = val;
  audio.src = stations[val];
  document.getElementById("stationName").innerText = stationNames[val];
  audio.play();
}

// 🎵 ON DEMAND
function playOnDemand(file){
  if(file){
    audio.src = file;
    audio.play();
  }
}

// 🎧 VISUALIZER
function drawVisualizer(){

  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    let bass = dataArray[2] * 0.4;
    let radius = 30 + bass;

    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255,140,0,0.2)";
    ctx.fill();

    for(let i=0;i<bufferLength;i++){
      let val = dataArray[i];
      let angle = (i/bufferLength)*Math.PI*2;
      let height = val * 0.4;

      let x1 = cx + Math.cos(angle)*radius;
      let y1 = cy + Math.sin(angle)*radius;

      let x2 = cx + Math.cos(angle)*(radius + height);
      let y2 = cy + Math.sin(angle)*(radius + height);

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.strokeStyle="orange";
      ctx.stroke();
    }
  }

  draw();
}

</script>

</body>
</html>
