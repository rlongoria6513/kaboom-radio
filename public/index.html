<!DOCTYPE html>
<html>
<head>
<title>KABOOM INDUSTRY</title>
<style>
body {margin:0;background:black;color:white;text-align:center;}
.player {margin-top:100px;}
</style>
</head>
<body>

<h1>KABOOM TEJANO NETWORK</h1>

<audio id="player" controls></audio>

<script>
let audio = document.getElementById("player");

async function loadStream(){
 let res = await fetch('/stream');
 let url = await res.text();
 audio.src = url;
}

loadStream();
</script>

</body>
</html>
