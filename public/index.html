<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  padding:20px;
}

.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:20px;
  width:100%;
  max-width:320px;
}

button{
  width:100%;
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  font-size:18px;
}

input[type=range]{
  width:100%;
  margin-top:10px;
}

canvas{
  display:block;
  margin:10px auto;
  width:200px;
  height:200px;
}

#artwork{
  width:140px;
  border-radius:12px;
  margin:10px auto;
}
</style>

</head>

<body>

<div class="container">

<h2>🔥 KABOOM RADIO 🔥</h2>
<p id="nowPlaying">Tap PLAY to start</p>

<img id="artwork" src="https://via.placeholder.com/300">

<div class="playerBox">

<canvas id="visualizer" width="200" height="200"></canvas>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>

<input type="range" min="0" max="1" step="0.01" value="0.7"
       oninput="setVolume(this.value)">

</div>

<audio id="player"></audio>

</div>

<script>

let audio = document.getElementById("player");

// 🔥 STREAM
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";
audio.setAttribute("playsinline", true);
audio.setAttribute("webkit-playsinline", true);
audio.crossOrigin = "anonymous";

let audioCtx;
let analyser;
let source;
let currentSong = "";

// ▶ PLAY
function playRadio(){

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }

  audio.muted = false;

  audio.play().then(()=>{

    if(!source){

      source = audioCtx.createMediaElementSource(audio);
      analyser = audioCtx.createAnalyser();

      analyser.fftSize = 512;

      source.connect(analyser);
      analyser.connect(audioCtx.destination);

      drawVisualizer();
    }

    document.getElementById("nowPlaying").innerText = "🎵 Playing";

  }).catch(()=>{
    alert("Tap PLAY again");
  });
}

// ⏸ PAUSE
function pauseRadio(){
  audio.pause();
  document.getElementById("nowPlaying").innerText = "⏸ Paused";
}

// 🔊 VOLUME
function setVolume(val){
  audio.volume = val;
}

// 🎵 SONG DETECTION
async function getNowPlaying(){
  try{
    let res = await fetch("https://pstnet38.shoutcastnet.com:10044/7.html");
    let text = await res.text();

    let song = text.split(",")[6];

    if(song && song !== currentSong){

      currentSong = song;
      document.getElementById("nowPlaying").innerText = "🎵 " + song;

      let parts = song.split(" - ");
      let artist = parts[0] || "";
      let title = parts[1] || song;

      fetchArtwork(artist, title);
    }

  }catch(e){}
}

async function fetchArtwork(artist, title){

  let query = encodeURIComponent(artist + " " + title);

  let res = await fetch(`https://itunes.apple.com/search?term=${query}&limit=1`);
  let data = await res.json();

  if(data.results.length > 0){
    document.getElementById("artwork").src =
      data.results[0].artworkUrl100.replace("100x100","500x500");
  }
}

// update song every 10 sec
setInterval(getNowPlaying, 10000);

// 🎧 VISUALIZER (NEON MODE)
function drawVisualizer(){

  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    let bass = dataArray[2] * 0.5;
    let radius = 40 + bass;

    // glowing center
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255,140,0,0.2)";
    ctx.fill();

    for(let i=0;i<bufferLength;i++){

      let val = dataArray[i];
      let angle = (i/bufferLength)*Math.PI*2;
      let height = val * 0.6;

      let x1 = cx + Math.cos(angle)*radius;
      let y1 = cy + Math.sin(angle)*radius;

      let x2 = cx + Math.cos(angle)*(radius + height);
      let y2 = cy + Math.sin(angle)*(radius + height);

      let hue = (Date.now()/20) % 360;

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.strokeStyle = `hsl(${hue},100%,50%)`;
      ctx.shadowBlur = 15;
      ctx.shadowColor = `hsl(${hue},100%,50%)`;
      ctx.stroke();
    }

    ctx.shadowBlur = 0;
  }

  draw();
}

</script>

</body>
</html>
