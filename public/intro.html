<!DOCTYPE html>
<html>
<head>
<title>KABOOM INTRO</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family: Arial;
}

video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

.enter {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 30px;
  font-size:20px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
  opacity:0;
  transition:1s;
}
</style>
</head>

<body>

<video id="introVideo" autoplay muted>
  <source src="intro.mp4" type="video/mp4">
</video>

<button class="enter" id="enterBtn">ENTER NETWORK</button>

<script>
const video = document.getElementById("introVideo");
const btn = document.getElementById("enterBtn");

video.onended = () => {
  btn.style.opacity = 1;
};

btn.onclick = () => {
  window.location.href = "/index.html";
};
</script>

</body>
</html>
