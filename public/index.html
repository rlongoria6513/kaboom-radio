<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:20px;
  width:100%;
  max-width:360px;
}

h1{font-size:22px;}

button{
  width:100%;
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  font-size:18px;
}

input[type=range]{
  width:100%;
  margin-top:10px;
}

canvas{
  display:block;
  margin:10px auto;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 KABOOM RADIO 🔥</h1>
<p id="nowPlaying">🎵 Ready</p>

<div class="playerBox">

<canvas id="visualizer" width="260" height="260"></canvas>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>

<input type="range" min="0" max="1" step="0.01" value="0.7"
       oninput="setVolume(this.value)">

</div>

<audio id="player" crossorigin="anonymous"></audio>

</div>

<script>

let audio = document.getElementById("player");
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";

// 🔥 IMPORTANT FIX FOR iPHONE VOLUME
audio.volume = 0.7;

let audioCtx;
let analyser;
let source;

// ▶ PLAY
function playRadio(){

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }

  audio.play();

  if(!source){

    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 256;

    drawVisualizer();
  }

  document.getElementById("nowPlaying").innerText = "🎵 Playing...";
}

// ⏸ PAUSE
function pauseRadio(){
  audio.pause();
  document.getElementById("nowPlaying").innerText = "⏸ Paused";
}

// 🔊 VOLUME FIX (REAL FIX)
function setVolume(val){
  audio.volume = val;   // ← THIS is the correct iPhone fix
}

// 🎧 REAL VISUALIZER (FIXED)
function drawVisualizer(){

  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    for(let i=0;i<bufferLength;i++){

      let val = dataArray[i];
      let angle = (i/bufferLength)*Math.PI*2;
      let radius = 60;
      let height = val * 0.5;

      let x1 = cx + Math.cos(angle)*radius;
      let y1 = cy + Math.sin(angle)*radius;
      let x2 = cx + Math.cos(angle)*(radius + height);
      let y2 = cy + Math.sin(angle)*(radius + height);

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.strokeStyle = "orange";
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  draw();
}

</script>

</body>
</html>
