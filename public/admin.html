<!DOCTYPE html>
<html>
<head>

<title>KABOOM ADMIN</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

input, button{
  width:90%;
  padding:15px;
  margin:10px;
  font-size:16px;
  border-radius:10px;
  border:none;
}

button{
  background:orange;
  color:white;
}

</style>

</head>

<body>

<h1>🔥 KABOOM CONTROL PANEL 🔥</h1>

<input id="stationName" placeholder="Station Name">
<input id="stationURL" placeholder="Stream URL">

<button onclick="addStation()">➕ Add Station</button>

<h2>Saved Stations</h2>
<div id="stations"></div>

<script>

function addStation(){
  let name = document.getElementById("stationName").value;
  let url = document.getElementById("stationURL").value;

  let stations = JSON.parse(localStorage.getItem("stations") || "[]");

  stations.push({name, url});
  localStorage.setItem("stations", JSON.stringify(stations));

  loadStations();
}

function loadStations(){
  let stations = JSON.parse(localStorage.getItem("stations") || "[]");
  let div = document.getElementById("stations");

  div.innerHTML = "";

  stations.forEach(s=>{
    div.innerHTML += `<p>${s.name}</p>`;
  });
}

loadStations();

</script>

</body>
</html>
