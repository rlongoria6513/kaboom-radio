<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

/* CENTER */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

/* PLAYER BOX */
.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:20px;
  width:100%;
  max-width:340px;
  box-shadow: 0 0 30px rgba(255,165,0,0.2);
}

/* ARTWORK */
.logo{
  width:100%;
  border-radius:15px;
}

/* TITLE */
h1{
  font-size:22px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:10px;
  padding:16px;
  font-size:18px;
  border-radius:12px;
  border:none;
  background: linear-gradient(45deg, orange, #ff9900);
  color:white;
  font-weight:bold;
}

/* VOLUME */
input{
  width:100%;
  margin-top:10px;
}

/* VISUALIZER */
#visualizer{
  margin:15px auto;
  display:block;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 KABOOM RADIO 🔥</h1>
<p id="nowPlaying">🎵 Ready</p>

<div class="playerBox">

<img id="artwork" src="https://via.placeholder.com/500x500.png?text=KABOOM" class="logo">

<canvas id="visualizer" width="260" height="260"></canvas>

<select onchange="changeStation(this.value)">
  <option value="https://pstnet38.shoutcastnet.com:10044/stream">Main Tejano</option>
</select>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>

<input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">

</div>

<audio id="player"></audio>

</div>

<script>

let audio = document.getElementById("player");
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";

let audioCtx, analyser, source;

// PLAY
function playRadio(){
  audio.play();
  document.getElementById("nowPlaying").innerText = "🎵 LIVE";

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();

    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 128;

    drawVisualizer();
  }
}

// PAUSE
function pauseRadio(){
  audio.pause();
}

// VOLUME
function setVolume(v){
  audio.volume = v;
}

// CHANGE STATION
function changeStation(url){
  audio.src = url;
  audio.play();
}

// VISUALIZER
function drawVisualizer(){

  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;
    let radius = 70;

    for(let i=0;i<bufferLength;i++){
      let val = dataArray[i];
      let angle = (i/bufferLength)*Math.PI*2;
      let height = val*0.6;

      let x1 = cx + Math.cos(angle)*radius;
      let y1 = cy + Math.sin(angle)*radius;

      let x2 = cx + Math.cos(angle)*(radius+height);
      let y2 = cy + Math.sin(angle)*(radius+height);

      ctx.strokeStyle = "orange";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();
    }
  }

  draw();
}

</script>

</body>
</html>
