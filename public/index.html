<!DOCTYPE html>
<html>
<head>
<title>KABOOM INDUSTRY</title>
<style>
body {margin:0;background:black;color:white;text-align:center;}
.player {margin-top:100px;}
</style>
</head>
<body>

<h1>KABOOM TEJANO NETWORK</h1>

<div class="player">
  <audio id="player" controls></audio>
  <br><br>
  <button onclick="startRadio()">▶ START RADIO</button>
</div>

<script>
let audio = document.getElementById("player");

async function loadStream(){
  try {
    let res = await fetch('/stream');
    let url = await res.text();
    audio.src = url;
  } catch(e){
    console.log("Stream error");
  }
}

loadStream();

// 🔥 REQUIRED for iPhone + browsers
function startRadio(){
  audio.muted = false;
  audio.play();
}
</script>

</body>
</html>
