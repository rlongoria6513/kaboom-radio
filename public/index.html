<!DOCTYPE html>


<html>
<head>
 <head>
<title>KABOOM RADIO</title>

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ff6600">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KABOOM RADIO">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

<style>
  @media (max-width:600px){

  h1 {
    font-size:18px;
    margin-top:10px;
  }

  p {
    font-size:14px;
  }

  #mainVideo {
    width:95%;
    margin-top:10px;
  }

  .player {
    top:70%;
  }

  button {
    width:85%;
    font-size:18px;
  }

}

/* BACKGROUND VIDEO */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* DARK OVERLAY */
body::after {
  content: "";
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* PAGE */
body {
  margin:0;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* LOGO */
.logoWrap {
  display:flex;
  justify-content:center;
  margin-top:30px;
}

#mainVideo {
  width:500px;
  max-width:90%;
}

/* PLAYER */
.player {
  position:absolute;
  top:60%;
  left:50%;
  transform:translate(-50%, -50%);
}
}

/* BUTTON */
button {
  background:orange;
  border:none;
  padding:15px 25px;
  font-size:18px;
  cursor:pointer;
  border-radius:8px;
}

/* BARS */
.bars {
  display:flex;
  justify-content:center;
  gap:5px;
  margin:20px 0;
}

.bars span {
  width:6px;
  height:20px;
  background:orange;
  animation:bounce 1s infinite;
}

@keyframes bounce {
  0%,100% { height:10px; }
  50% { height:30px; }
}

/* MOBILE */
@media (max-width:600px){
  #mainVideo { width:95%; }
  .player { top:75%; }
  button { width:80%; }
}

</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="mainvideo.mp4" type="video/mp4">
</video>

<h1>🔥 KABOOM TEJANO NETWORK 🔥</h1>
<p id="nowPlaying">🎵 Now Playing: Tejano Mix Live</p>

<!-- LOGO -->
<div class="logoWrap">
  <video id="mainVideo" autoplay muted loop playsinline>
    <source src="mainvideo.mp4" type="video/mp4">
  </video>
</div>

<!-- PLAYER -->
<div class="player">

  <audio id="player"></audio>

  <div class="bars">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <button onclick="startRadio()">▶ START RADIO</button>

</div>

<script>
let audio = document.getElementById("player");

// load stream
async function loadStream(){
  let res = await fetch('/stream');
  let url = await res.text();
  audio.src = url;
}
loadStream();

// start radio
function startRadio(){
  audio.muted = false;
  audio.play();
}

// fake now playing
const songs = ["Tejano Mix","Cumbia Party","KABOOM Radio"];

function updateNowPlaying(){
  let random = songs[Math.floor(Math.random()*songs.length)];
  document.getElementById("nowPlaying").innerText =
    "🎵 Now Playing: " + random;
}

setInterval(updateNowPlaying, 4000);
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("Service Worker Ready"));
}
</script>
</body>
</html>
