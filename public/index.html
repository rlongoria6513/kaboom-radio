<script>
let audio = document.getElementById("player");

async function loadStream(){
  try {
    let res = await fetch('/stream');
    let url = await res.text();
    audio.src = url;
  } catch(e){
    console.log("Stream error");
  }
}

loadStream();

// 🔥 detect coming from intro
const params = new URLSearchParams(window.location.search);

if(params.get("play") === "true"){
  // delay helps browser allow audio
  setTimeout(() => {
    audio.muted = false;
    audio.play().catch(() => {
      console.log("Autoplay blocked");
    });
  }, 500);
}

// backup manual button
function startRadio(){
  audio.muted = false;
  audio.play();
}
</script>
