<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>

<link rel="manifest" href="/public/manifest.json">
<link rel="apple-touch-icon" href="/public/icon-192.png">

<meta name="theme-color" content="#ff6600">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

/* CENTER */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* PLAYER BOX */
.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:25px;
  width:320px;
  box-shadow: 0 0 30px rgba(255,165,0,0.2);
}

/* LOGO */
.logo{
  width:100%;
  border-radius:15px;
}

/* TITLE */
h1{
  font-size:26px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:10px;
  background: linear-gradient(45deg, orange, #ff9900);
  border:none;
  padding:15px;
  font-size:18px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  box-shadow: 0 0 10px orange;
}

/* VOLUME */
input[type=range]{
  width:100%;
  margin-top:15px;
}

/* STATIONS */
select{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-top:15px;
  background:black;
  color:white;
  border:1px solid orange;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 KABOOM RADIO 🔥</h1>
<p id="nowPlaying">🎵 Ready</p>

<div class="playerBox">

<img id="artwork" src="/public/icon-512.png" class="logo">
<!-- STATIONS -->
<select onchange="changeStation(this.value)">
  <option value="https://pstnet38.shoutcastnet.com:10044/stream">Main Tejano</option>
  <option value="https://stream.zeno.fm/f3wvbbqmdg8uv">Latin Mix</option>
  <option value="https://stream.zeno.fm/8u1qf1h7r8quv">Party Hits</option>
</select>

<!-- BUTTONS -->
<button onclick="playRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">⏸ PAUSE</button>

<!-- VOLUME -->
<input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">

</div>

<audio id="player"></audio>

</div>

<script>

let audio = document.getElementById("player");

// DEFAULT STREAM
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";

// PLAY
function playRadio(){
  audio.play();
  document.getElementById("nowPlaying").innerText = "🎵 Playing...";
}

// PAUSE
function pauseRadio(){
  audio.pause();
  document.getElementById("nowPlaying").innerText = "⏸ Paused";
}

// VOLUME
function setVolume(val){
  audio.volume = val;
}

// CHANGE STATION
function changeStation(url){
  audio.src = url;
  audio.play();
  document.getElementById("nowPlaying").innerText = "📻 Switched Station";
}

// PWA
if ("serviceWorker" in navigator){
  navigator.serviceWorker.register("/public/sw.js");
  // 🔥 GET REAL SONG FROM STREAM
async function getNowPlaying(){

  try{
    let res = await fetch("https://pstnet38.shoutcastnet.com:10044/7.html");
    let text = await res.text();

    let parts = text.split(",");
    let song = parts[6];

    if(song){
      document.getElementById("nowPlaying").innerText = "🎵 " + song;

      let split = song.split(" - ");
      let artist = split[0] || "";
      let title = split[1] || song;

      fetchArtwork(artist, title);
    }

  }catch(e){
    console.log("error getting song");
  }
}

// 🔥 GET ALBUM ART
async function fetchArtwork(artist, title){

  try{
    let query = encodeURIComponent(artist + " " + title);

    let res = await fetch(`https://itunes.apple.com/search?term=${query}&limit=1`);
    let data = await res.json();

    if(data.results.length > 0){
      let art = data.results[0].artworkUrl100.replace("100x100", "500x500");
      document.getElementById("artwork").src = art;
    }

  }catch(e){
    console.log("artwork error");
  }
}

// 🔁 UPDATE EVERY 10 SECONDS
setInterval(getNowPlaying, 10000);
getNowPlaying();
}

</script>

</body>
</html>
