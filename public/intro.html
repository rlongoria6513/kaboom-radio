<!DOCTYPE html>
<html>
<head>
<title>KABOOM INTRO</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family: Arial;
}

video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

.enter {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 30px;
  font-size:20px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
  opacity:0;
  transition:1s;
}
</style>
</head>

<body>

<script>
let video = document.getElementById("introVideo");

document.addEventListener("click", () => {
  video.muted = false;
  video.play();
});
</script>
  <source src="intro.mp4" type="video/mp4">
</video>

<button class="enter" id="enterBtn" onclick="enterSite()">
  ENTER NETWORK
</button>

<audio id="preloadAudio"></audio>

<script>
async function enterSite(){

  let audio = document.getElementById("preloadAudio");

  try {
    let res = await fetch('/stream');
    let url = await res.text();

    audio.src = url;

    // 🔥 unlock audio BEFORE leaving page
    await audio.play();

  } catch(e){
    console.log("Audio unlock failed");
  }

  // go to main page
  window.location.href = "index.html";
}
</script>

<script>
function enterSite(){
  window.location.href = "index.html?play=true";
}
</script></button>

<script>
const video = document.getElementById("introVideo");
const btn = document.getElementById("enterBtn");

video.onended = () => {
  btn.style.opacity = 1;
};

btn.onclick = () => {
  window.location.href = "/index.html";
};
</script>

</body>
</html>
