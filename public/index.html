<!DOCTYPE html>
<html>
<head>

<title>KABOOM RADIO</title>

<link rel="manifest" href="/public/manifest.json">
<link rel="apple-touch-icon" href="/public/icon-192.png">

<meta name="theme-color" content="#ff6600">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KABOOM RADIO">

<style>

/* BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

/* MAIN CONTAINER */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* TITLE */
h1{
  font-size:28px;
  letter-spacing:2px;
}

/* NOW PLAYING */
#nowPlaying{
  opacity:0.8;
  margin-bottom:20px;
}

/* GLASS PLAYER */
.playerBox{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:25px;
  width:300px;
  box-shadow: 0 0 30px rgba(255,165,0,0.2);
}

/* LOGO */
.logo{
  width:100%;
  border-radius:15px;
}

/* BARS */
.bars{
  display:flex;
  justify-content:center;
  gap:5px;
  margin:20px 0;
}

.bars span{
  width:6px;
  height:20px;
  background:orange;
  border-radius:3px;
  animation:bounce 1s infinite;
}

@keyframes bounce{
  0%,100%{height:10px;}
  50%{height:30px;}
}

/* BUTTON */
button{
  width:100%;
  background: linear-gradient(45deg, orange, #ff9900);
  border:none;
  padding:15px;
  font-size:18px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  box-shadow: 0 0 15px orange;
}

/* MOBILE */
@media (max-width:600px){
  h1{font-size:22px;}
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 KABOOM TEJANO 🔥</h1>
<p id="nowPlaying">🎵 Loading stream...</p>

<div class="playerBox">

<img src="/public/icon-512.png" class="logo">

<div class="bars">
<span></span><span></span><span></span><span></span><span></span>
</div>

<button onclick="startRadio()">▶ PLAY LIVE RADIO</button>

</div>

<audio id="player"></audio>

</div>

<script>

let audio = document.getElementById("player");

// 🔥 DIRECT STREAM
audio.src = "https://pstnet38.shoutcastnet.com:10044/stream";

// PLAY BUTTON
function startRadio(){
  audio.play();
  document.getElementById("nowPlaying").innerText = "🎵 LIVE TEJANO STREAM";
}

// FAKE SONG ROTATION
const songs = ["Tejano Hits","Cumbia Mix","KABOOM Radio","Latin Party"];

function updateNowPlaying(){
  let random = songs[Math.floor(Math.random()*songs.length)];
  document.getElementById("nowPlaying").innerText = "🎵 " + random;
}

setInterval(updateNowPlaying, 4000);

// PWA
if ("serviceWorker" in navigator){
  navigator.serviceWorker.register("/public/sw.js");
}

</script>

</body>
</html>
